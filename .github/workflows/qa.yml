name: Quality Assurance

on:
  push:
    branches:
      - master

jobs:
  codecheck:
    name: Coding Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Run Composer
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Run code style check
        run: composer cs:check

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Run Composer
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        run: composer phpstan